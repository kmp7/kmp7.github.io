<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kmp+</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --text-primary: #333333;
            --text-secondary: #666666;
            --accent: #325980;
            --accent-hover: #2a4a6b;
            --border: #e0e0e0;
            --shadow: rgba(0, 0, 0, 0.1);
            --success: #4caf50;
            --danger: #f44336;
            --info: #2196f3;
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent: #4a7ba7;
            --accent-hover: #5a8bb7;
            --border: #404040;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            background-color: var(--accent);
            color: white;
            padding: 2rem 0;
            box-shadow: 0 2px 10px var(--shadow);
            position: relative;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            text-align: center;
            flex: 1;
        }

        .theme-toggle {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            transition: background-color 0.3s ease;
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
        }

        .theme-toggle:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        main {
            padding: 2rem 0;
        }

        .info-section {
            background-color: var(--bg-secondary);
            padding: 2rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            box-shadow: 0 2px 10px var(--shadow);
        }

        .info-section h2 {
            color: var(--accent);
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .info-section p {
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .btn-primary {
            background-color: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 10px var(--shadow);
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border);
            border-radius: 5px;
            font-size: 1rem;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            transition: border-color 0.3s ease;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent);
        }

        .dictionary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .term-card {
            background-color: var(--bg-secondary);
            padding: 1.5rem;
            border-radius: 10px;
            box-shadow: 0 2px 10px var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }

        .term-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px var(--shadow);
        }

        .term-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }

        .term-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent);
        }

        .term-english {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-style: italic;
            margin-bottom: 0.5rem;
        }

        .term-definition {
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .term-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        .btn-edit {
            background-color: var(--info);
            color: white;
        }

        .btn-delete {
            background-color: var(--danger);
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background-color: var(--bg-secondary);
            margin: 5% auto;
            padding: 2rem;
            border-radius: 10px;
            max-width: 600px;
            width: 90%;
            animation: slideIn 0.3s ease;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h3 {
            color: var(--accent);
            font-size: 1.5rem;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: color 0.3s ease;
        }

        .close-btn:hover {
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--border);
            border-radius: 5px;
            font-size: 1rem;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            background-color: var(--success);
            color: white;
            border-radius: 5px;
            box-shadow: 0 2px 10px var(--shadow);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 2000;
        }

        .toast.show {
            transform: translateX(0);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .header-content {
                padding-right: 60px;
            }

            .dictionary-grid {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
            }

            .search-box {
                min-width: 100%;
            }
        }
		footer {
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <h1>Тезаурус внимания</h1>
                <button class="theme-toggle" id="themeToggle">🌙</button>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <section class="info-section">
            
                
                <p>Все изменения статей автоматически сохраняются: создание (с помощью кнопки +), редактирование, удаление</p>
				<p>HTML5, CSS3, JavaScript (ES6+), localStorage API</p>
            </section>

            <div class="controls">
                <input type="text" class="search-box" id="searchBox" placeholder="Поиск терминов...">
                <button class="btn btn-primary" id="addTermBtn">+</button>
            </div>

            <div class="dictionary-grid" id="dictionaryGrid"></div>
        </div>
    </main>

    <div class="modal" id="termModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Добавить термин</h3>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <form id="termForm">
                <div class="form-group">
                    <label for="termRussian">Термин на русском</label>
                    <input type="text" id="termRussian" required>
                </div>
                <div class="form-group">
                    <label for="termEnglish">Термин на английском</label>
                    <input type="text" id="termEnglish" required>
                </div>
                <div class="form-group">
                    <label for="termDefinition">Определение</label>
                    <textarea id="termDefinition" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Сохранить</button>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

        "russian": "Информационная перегрузка",
        "english": "Information Overload",
        "definition": "Состояние, при котором объём доступной информации превышает когнитивные возможности человека по её обработке, приводя к снижению качества решений, стрессу и истощению внимания."
    }
];

        let terms = [];
        let editingId = null;

        // Инициализация приложения
        function init() {
            loadTerms();
            renderTerms();
            setupEventListeners();
            loadTheme();
        }

        // Загрузка терминов из localStorage
        function loadTerms() {
            const savedTerms = localStorage.getItem('bayesianTerms');
            if (savedTerms) {
                terms = JSON.parse(savedTerms);
            } else {
                terms = [...defaultTerms];
                saveTerms();
            }
        }

        // Сохранение терминов в localStorage
        function saveTerms() {
            localStorage.setItem('bayesianTerms', JSON.stringify(terms));
        }

        // Отображение терминов
        function renderTerms(searchTerm = '') {
            const grid = document.getElementById('dictionaryGrid');
            const filteredTerms = terms.filter(term => 
                term.russian.toLowerCase().includes(searchTerm.toLowerCase()) ||
                term.english.toLowerCase().includes(searchTerm.toLowerCase()) ||
                term.definition.toLowerCase().includes(searchTerm.toLowerCase())
            );

            grid.innerHTML = filteredTerms.map(term => `
                <div class="term-card" data-id="${term.id}">
                    <div class="term-header">
                        <div>
                            <h3 class="term-title">${term.russian}</h3>
                            <p class="term-english">${term.english}</p>
                        </div>
                    </div>
                    <p class="term-definition">${term.definition}</p>
                    <div class="term-actions">
                        <button class="btn btn-small btn-edit" onclick="editTerm(${term.id})">Редактировать</button>
                        <button class="btn btn-small btn-delete" onclick="deleteTerm(${term.id})">Удалить</button>
                    </div>
                </div>
            `).join('');
        }

        // Настройка обработчиков событий
        function setupEventListeners() {
            // Поиск
            document.getElementById('searchBox').addEventListener('input', (e) => {
                renderTerms(e.target.value);
            });

            // Добавление термина
            document.getElementById('addTermBtn').addEventListener('click', () => {
                editingId = null;
                document.getElementById('modalTitle').textContent = 'Добавить термин';
                document.getElementById('termForm').reset();
                document.getElementById('termModal').style.display = 'block';
            });

            // Закрытие модального окна
            document.getElementById('closeModal').addEventListener('click', closeModal);
            document.getElementById('termModal').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeModal();
            });

            // Отправка формы
            document.getElementById('termForm').addEventListener('submit', (e) => {
                e.preventDefault();
                saveTerm();
            });

            // Переключение темы
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        }

        // Сохранение термина
        function saveTerm() {
            const russian = document.getElementById('termRussian').value.trim();
            const english = document.getElementById('termEnglish').value.trim();
            const definition = document.getElementById('termDefinition').value.trim();

            if (!russian || !english || !definition) {
                showToast('Заполните все поля', 'error');
                return;
            }

            if (editingId) {
                // Редактирование
                const index = terms.findIndex(t => t.id === editingId);
                terms[index] = { id: editingId, russian, english, definition };
                showToast('Термин успешно обновлен');
            } else {
                // Добавление
                const newTerm = {
                    id: Date.now(),
                    russian,
                    english,
                    definition
                };
                terms.push(newTerm);
                showToast('Термин успешно добавлен');
            }

            saveTerms();
            renderTerms();
            closeModal();
        }

        // Редактирование термина
        function editTerm(id) {
            const term = terms.find(t => t.id === id);
            if (!term) return;

            editingId = id;
            document.getElementById('modalTitle').textContent = 'Редактировать термин';
            document.getElementById('termRussian').value = term.russian;
            document.getElementById('termEnglish').value = term.english;
            document.getElementById('termDefinition').value = term.definition;
            document.getElementById('termModal').style.display = 'block';
        }

        // Удаление термина
        function deleteTerm(id) {
            if (confirm('Вы уверены, что хотите удалить этот термин?')) {
                terms = terms.filter(t => t.id !== id);
                saveTerms();
                renderTerms();
                showToast('Термин успешно удален');
            }
        }

        // Закрытие модального окна
        function closeModal() {
            document.getElementById('termModal').style.display = 'none';
            editingId = null;
        }

        // Показ уведомления
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.backgroundColor = type === 'error' ? 'var(--danger)' : 'var(--success)';
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Переключение темы
        function toggleTheme() {
            const body = document.body;
            const themeToggle = document.getElementById('themeToggle');
            
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                themeToggle.textContent = '🌙';
                localStorage.setItem('theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
                themeToggle.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
            }
        }

        // Загрузка темы
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            const themeToggle = document.getElementById('themeToggle');
            
            if (savedTheme === 'dark') {
                document.body.setAttribute('data-theme', 'dark');
                themeToggle.textContent = '☀️';
            }
        }

        // Запуск приложения
        init();
    </script>
</body>
</html>
