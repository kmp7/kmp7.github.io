<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kmp+</title>
    <style>
        :root {
            --bg-color: #f5f5f5;
            --text-color: #333;
            --container-bg: white;
            --header-bg: #325980;
            --header-text: white;
            --border-color: #eee;
            --term-color: #325980;
            --equivalent-color: #666;
            --search-border: #ddd;
            --badge-bg: #e8f4fc;
            --badge-color: #3498db;
            --active-btn-bg: #3498db;
            --active-btn-text: white;
            --btn-bg: #f5f5f5;
            --btn-text: #333;
            --shadow-color: rgba(0, 0, 0, 0.1);
        }

        .dark-mode {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --container-bg: #2d2d2d;
            --header-bg: #1a3a5a;
            --header-text: #f0f0f0;
            --border-color: #444;
            --term-color: #4a90e2;
            --equivalent-color: #aaa;
            --search-border: #555;
            --badge-bg: #2a4365;
            --badge-color: #63b3ed;
            --active-btn-bg: #63b3ed;
            --active-btn-text: #111;
            --btn-bg: #3d3d3d;
            --btn-text: #ddd;
            --shadow-color: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: var(--container-bg);
            border-radius: 8px;
            box-shadow: 0 2px 10px var(--shadow-color);
            overflow: hidden;
            transition: background-color 0.3s, box-shadow 0.3s;
        }
        
        .header {
            background-color: var(--header-bg);
            color: var(--header-text);
            padding: 20px 40px;
            text-align: center;
            position: relative;
            transition: background-color 0.3s, color 0.3s;
        }
        
        .header h1 {
            margin: 0;
            font-size: 24px;
        }
        
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--header-text);
            font-size: 20px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background-color 0.3s;
        }
        
        .theme-toggle:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        
        .content {
            padding: 20px;
        }
        
        .search-container {
            margin-bottom: 20px;
        }
        
        .search-box {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--search-border);
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: var(--container-bg);
            color: var(--text-color);
            transition: border-color 0.3s, background-color 0.3s, color 0.3s;
        }
        
        .search-box:focus {
            outline: none;
            border-color: var(--active-btn-bg);
        }
        
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .language-toggle {
            display: flex;
            justify-content: center;
            flex-grow: 1;
        }
        
        .language-btn {
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: 1px solid var(--search-border);
            padding: 8px 15px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .language-btn:first-child {
            border-radius: 4px 0 0 4px;
        }
        
        .language-btn:last-child {
            border-radius: 0 4px 4px 0;
        }
        
        .language-btn.active {
            background-color: var(--active-btn-bg);
            color: var(--active-btn-text);
            border-color: var(--active-btn-bg);
        }
        
        .glossary-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        
        .glossary-item {
            border-bottom: 1px solid var(--border-color);
            padding: 15px 0;
            transition: border-color 0.3s;
        }
        
        .glossary-item:last-child {
            border-bottom: none;
        }
        
        .term {
            font-weight: bold;
            color: var(--term-color);
            font-size: 18px;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: color 0.3s;
        }
        
        .term-text {
            flex: 1;
        }
        
        .equivalent {
            color: var(--equivalent-color);
            font-style: italic;
            font-size: 14px;
            transition: color 0.3s;
        }
        
        .definition {
            margin-top: 5px;
            line-height: 1.5;
        }
        
        .no-results {
            text-align: center;
            padding: 20px;
            color: var(--equivalent-color);
        }
        
        .category-badge {
            background-color: var(--badge-bg);
            color: var(--badge-color);
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 12px;
            margin-left: 10px;
            font-weight: normal;
            transition: background-color 0.3s, color 0.3s;
        }
        
        @media (max-width: 600px) {
            .header {
                padding: 20px 20px 20px 50px;
            }
            
            .theme-toggle {
                top: 50%;
                transform: translateY(-50%);
                right: auto;
                left: 15px;
            }
            
            .term {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .category-badge {
                margin-left: 0;
                margin-top: 5px;
            }
            
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .language-toggle {
                width: 100%;
            }
        }
		 footer {
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="theme-toggle" id="themeToggle">🌙</button>
            <h1>Attention LLM </h1>
			
        </div>
        <div class="content">
            <div class="search-container">
                <input type="text" class="search-box" id="searchInput" placeholder="Поиск ...">
            </div>
            
            <div class="controls">
                <div class="language-toggle">
                    <button class="language-btn active" data-lang="ru">Русский</button>
                    <button class="language-btn" data-lang="en">English</button>
                </div>
            </div>
            
            <ul class="glossary-list" id="glossaryList">
                <!-- Content will be dynamically populated here -->
            </ul>
            
            <div class="no-results" id="noResults" style="display:none;">
                Термины не найдены. Попробуйте изменить поисковый запрос.
            </div>
        </div>
    </div>
<footer class="footer">
<div class="container">
<p>© 2026 | kmp |  CC BY-NC-SA 4.0</p>
<p>Разработано для студентов БрГУ имени А.С. Пушкина</p>
</div>
</div>
</footer>
<div style="position: fixed; bottom: 10px; color: #777777; right: 30px; opacity: 0.3; font-size: 14px;">kmp+</div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Glossary data
            const glossaryData = [
                       
		{
  "ru": {
    "term": "Внимание (в нейросетях, когнитивная метафора)",
    "equivalent": "Attention (Cognitive Metaphor in Neural Networks)",
    "definition": "Механизм, имитирующий выборочную фокусировку на наиболее релевантных частях входной последовательности при обработке языковых данных.",
    "category": "когнитивный, метафорический, психолингвистика"
  },
  "en": {
    "term": "Attention (Cognitive Metaphor in Neural Networks)",
    "equivalent": "Внимание (в нейросетях, когнитивная метафора)",
    "definition": "A mechanism that simulates selective focus on the most relevant parts of an input sequence during language processing.",
    "category": "cognitive, metaphorical, psycholinguistics"
  }
},
{
  "ru": {
    "term": "Attention (функциональный механизм)",
    "equivalent": "Attention (Functional Mechanism)",
    "definition": "Процедура взвешивания элементов входной последовательности, позволяющая модели учитывать их различную значимость при формировании выходного представления.",
    "category": "функциональный, вычислительная лингвистика"
  },
  "en": {
    "term": "Attention (Functional Mechanism)",
    "equivalent": "Attention (функциональный механизм)",
    "definition": "A procedure that assigns weights to elements of an input sequence, enabling the model to account for their varying importance when forming an output representation.",
    "category": "functional, computational linguistics"
  }
},
{
  "ru": {
    "term": "Attention (математическая операция)",
    "equivalent": "Attention (Mathematical Operation)",
    "definition": "Операция вычисления взвешенной суммы векторов значений (values), где веса определяются функцией сходства между запросом (query) и ключами (keys), нормализованной с помощью softmax.",
    "category": "математический, линейная алгебра, теория вероятностей"
  },
  "en": {
    "term": "Attention (Mathematical Operation)",
    "equivalent": "Attention (математическая операция)",
    "definition": "An operation that computes a weighted sum of value vectors, where weights are determined by a similarity function between a query and keys, normalized via softmax.",
    "category": "mathematical, linear algebra, probability theory"
  }
},
{
  "ru": {
    "term": "Attention (токен-ориентированное представление)",
    "equivalent": "Attention (Token-based Perspective)",
    "definition": "Механизм, при котором каждый токен в последовательности оценивает релевантность других токенов для построения собственного контекстуального представления.",
    "category": "токенизационный, NLP"
  },
  "en": {
    "term": "Attention (Token-based Perspective)",
    "equivalent": "Attention (токен-ориентированное представление)",
    "definition": "A mechanism in which each token evaluates the relevance of other tokens to construct its contextual representation.",
    "category": "token-based, NLP"
  }
},
{
  "ru": {
    "term": "Attention (векторное представление)",
    "equivalent": "Attention (Embedding-based Perspective)",
    "definition": "Операция над векторными представлениями (эмбеддингами), при которой формируется новый вектор как контекстуализированная комбинация других векторов.",
    "category": "векторный, распределённая семантика"
  },
  "en": {
    "term": "Attention (Embedding-based Perspective)",
    "equivalent": "Attention (векторное представление)",
    "definition": "An operation on vector representations (embeddings) that produces a new vector as a contextualized combination of other vectors.",
    "category": "vector-based, distributional semantics"
  }
},
{
  "ru": {
    "term": "Attention (в архитектуре Transformer)",
    "equivalent": "Attention (in Transformer Architecture)",
    "definition": "Ключевой компонент архитектуры Transformer, обеспечивающий взаимодействие всех элементов последовательности друг с другом без рекуррентных или сверточных операций.",
    "category": "архитектурный, нейросети"
  },
  "en": {
    "term": "Attention (in Transformer Architecture)",
    "equivalent": "Attention (в архитектуре Transformer)",
    "definition": "A core component of the Transformer architecture that enables all elements of a sequence to interact without recurrent or convolutional operations.",
    "category": "architectural, neural networks"
  }
},
{
  "ru": {
    "term": "Self-Attention (самовнимание)",
    "equivalent": "Self-Attention",
    "definition": "Вид механизма Attention, при котором запросы, ключи и значения формируются из одной и той же входной последовательности.",
    "category": "архитектурный, Transformer"
  },
  "en": {
    "term": "Self-Attention",
    "equivalent": "Self-Attention (самовнимание)",
    "definition": "A type of attention mechanism where queries, keys, and values are derived from the same input sequence.",
    "category": "architectural, Transformer"
  }
},
{
  "ru": {
    "term": "Multi-Head Attention",
    "equivalent": "Многоголовое внимание",
    "definition": "Расширение механизма Attention, при котором несколько независимых «голов» параллельно вычисляют различные аспекты зависимости между элементами последовательности.",
    "category": "архитектурный, нейросети"
  },
  "en": {
    "term": "Multi-Head Attention",
    "equivalent": "Многоголовое внимание",
    "definition": "An extension of attention where multiple independent heads compute different aspects of dependencies between sequence elements in parallel.",
    "category": "architectural, neural networks"
  }
},
{
  "ru": {
    "term": "Attention (вероятностное распределение)",
    "equivalent": "Attention (Probability Distribution)",
    "definition": "Нормализованное распределение весов по элементам последовательности, интерпретируемое как степень их релевантности для текущего вычисления.",
    "category": "вероятностный, статистический NLP"
  },
  "en": {
    "term": "Attention (Probability Distribution)",
    "equivalent": "Attention (вероятностное распределение)",
    "definition": "A normalized distribution of weights over sequence elements, interpreted as their relevance to the current computation.",
    "category": "probabilistic, statistical NLP"
  }
},
{
  "ru": {
    "term": "Attention (дискурсивный механизм)",
    "equivalent": "Attention (Discourse Mechanism)",
    "definition": "Механизм моделирования связности и зависимостей в дискурсе, позволяющий учитывать контекстуальные связи между языковыми единицами на разных уровнях текста.",
    "category": "дискурсивный, текстовая лингвистика"
  },
  "en": {
    "term": "Attention (Discourse Mechanism)",
    "equivalent": "Attention (дискурсивный механизм)",
    "definition": "A mechanism for modeling coherence and dependencies in discourse by capturing contextual relations between linguistic units across different levels of text.",
    "category": "discourse, text linguistics"
  }
},
{
  "ru": {
    "term": "Attention (оператор условного взвешивания)",
    "equivalent": "Attention (Conditional Weighting Operator)",
    "definition": "Параметризованный оператор A(Q,K,V)=softmax(QK^T/√d_k)V, отображающий тензоры Q,K,V∈ℝ^{n×d} в ℝ^{n×d} через нормализованную экспоненциальную функцию сходства, индуцирующую стохастическую матрицу весов W∈ℝ^{n×n}, где W_ij∝exp(q_i·k_j/√d_k).",
    "category": "формальный, тензорная алгебра, дифференцируемые операторы"
  },
  "en": {
    "term": "Attention (Conditional Weighting Operator)",
    "equivalent": "Attention (оператор условного взвешивания)",
    "definition": "A parameterized operator A(Q,K,V)=softmax(QK^T/√d_k)V mapping tensors Q,K,V∈ℝ^{n×d} to ℝ^{n×d} via an exponentiated similarity function inducing a stochastic weight matrix W∈ℝ^{n×n}, where W_ij∝exp(q_i·k_j/√d_k).",
    "category": "formal, tensor algebra, differentiable operators"
  }
},

{
  "ru": {
    "term": "Attention (чтение памяти, дидактическая метафора)",
    "equivalent": "Attention (Memory Reading Mechanism, Didactic Metaphor)",
    "definition": "Механизм, определяющий, какие части входной последовательности влияют друг на друга в текущий момент, интерпретируемый как способ чтения контекста (памяти) без его сохранения.",
    "category": "метафорический, дидактический, NLP",
    "note": "Термин «память» используется метафорически: Attention не хранит информацию, а вычисляет взвешенные зависимости между элементами входа."
  },
  "en": {
    "term": "Attention (Memory Reading Mechanism, Didactic Metaphor)",
    "equivalent": "Attention (чтение памяти, дидактическая метафора)",
    "definition": "A mechanism that determines which parts of an input sequence influence each other at a given moment, interpreted as a way of reading context (memory) without storing it.",
    "category": "metaphorical, didactic, NLP",
    "note": "The term 'memory' is metaphorical: attention does not store information but computes weighted dependencies between input elements."
  }
}

            ];

            // DOM elements
            const searchInput = document.getElementById('searchInput');
            const glossaryList = document.getElementById('glossaryList');
            const noResults = document.getElementById('noResults');
            const languageBtns = document.querySelectorAll('.language-btn');
            const themeToggle = document.getElementById('themeToggle');
            const body = document.body;

            // Current language (default: Russian)
            let currentLang = 'ru';

            // Theme state
            let isDarkMode = false;

            // Check for saved theme preference
            if (localStorage.getItem('darkMode') === 'enabled') {
                enableDarkMode();
            }

            // Function to enable dark mode
            function enableDarkMode() {
                body.classList.add('dark-mode');
                themeToggle.textContent = '☀️';
                isDarkMode = true;
                localStorage.setItem('darkMode', 'enabled');
            }

            // Function to disable dark mode
            function disableDarkMode() {
                body.classList.remove('dark-mode');
                themeToggle.textContent = '🌙';
                isDarkMode = false;
                localStorage.setItem('darkMode', 'disabled');
            }

            // Theme toggle event
            themeToggle.addEventListener('click', function() {
                if (isDarkMode) {
                    disableDarkMode();
                } else {
                    enableDarkMode();
                }
            });

            // Function to render glossary items
            function renderGlossary(items, lang) {
                glossaryList.innerHTML = '';
                
                if (items.length === 0) {
                    noResults.style.display = 'block';
                    return;
                }
                
                noResults.style.display = 'none';
                
                items.forEach(item => {
                    const langData = item[lang];
                    
                    const li = document.createElement('li');
                    li.className = 'glossary-item';
                    
                    li.innerHTML = `
                        <div class="term">
                            <span class="term-text">${langData.term}</span>
                            <span class="category-badge">${langData.category}</span>
                        </div>
                        <div class="equivalent">${langData.equivalent}</div>
                        <div class="definition">${langData.definition}</div>
                    `;
                    
                    glossaryList.appendChild(li);
                });
            }

            // Initial render
            renderGlossary(glossaryData, currentLang);

            // Search functionality
            searchInput.addEventListener('input', function() {
                const searchTerm = this.value.toLowerCase();
                
                if (searchTerm === '') {
                    renderGlossary(glossaryData, currentLang);
                    return;
                }
                
                const filteredItems = glossaryData.filter(item => {
                    const langData = item[currentLang];
                    return (
                        langData.term.toLowerCase().includes(searchTerm) ||
                        langData.equivalent.toLowerCase().includes(searchTerm) ||
                        langData.definition.toLowerCase().includes(searchTerm) ||
                        langData.category.toLowerCase().includes(searchTerm)
                    );
                });
                
                renderGlossary(filteredItems, currentLang);
            });
            
            // Language toggle
            languageBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const lang = this.getAttribute('data-lang');
                    
                    // Update active button
                    languageBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    // Update language and re-render
                    currentLang = lang;
                    
                    // Update placeholder text based on language
                    if (lang === 'ru') {
                        searchInput.placeholder = 'Поиск ...';
                        noResults.textContent = 'Термины не найдены. Попробуйте изменить поисковый запрос.';
                        document.querySelector('title').textContent = 'Глоссарий';
                    } else {
                        searchInput.placeholder = 'Search term...';
                        noResults.textContent = 'No terms found. Try changing your search query.';
                        document.querySelector('title').textContent = 'Glossary';
                    }
                    
                    // Re-apply search if there's a search term
                    const searchTerm = searchInput.value.toLowerCase();
                    
                    if (searchTerm === '') {
                        renderGlossary(glossaryData, currentLang);
                    } else {
                        const filteredItems = glossaryData.filter(item => {
                            const langData = item[currentLang];
                            return (
                                langData.term.toLowerCase().includes(searchTerm) ||
                                langData.equivalent.toLowerCase().includes(searchTerm) ||
                                langData.definition.toLowerCase().includes(searchTerm) ||
                                langData.category.toLowerCase().includes(searchTerm)
                            );
                        });
                        
                        renderGlossary(filteredItems, currentLang);
                    }
                });
            });
        });
    </script>
</body>
</html>
